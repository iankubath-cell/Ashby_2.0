name: Ashby-Vira Validation Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install networkx numpy scipy pandas pytest pytest-cov streamlit

      - name: Run Tests
        run: |
          pytest tests/ -v

      - name: Dashboard Smoke Test
        run: |
          timeout 30 streamlit run dashboard.py --server.headless true &
          sleep 5
          curl -f http://localhost:8501 || exit 1
          echo "Dashboard test passed"
