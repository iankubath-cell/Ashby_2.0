name: Ashby-Vira Validation Suite

# Trigger on pushes to main/develop and all pull requests
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# Cancel duplicate runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Validate Ashby Claims & Robustness
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    # 1. Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install networkx numpy scipy pandas
        pip install pytest pytest-cov pytest-xdist
        pip install streamlit

    # 4. Run Popper Falsifiability Tests (Rung 2 Logic)
    - name: Run Popper Falsifiability Suite
      run: |
        pytest tests/test_falsifiability.py -v --tb=short --junitxml=junit-falsifiability.xml

    # 5. Run Production Robustness Tests (Rung 2 Performance)
    - name: Run Production Robustness Suite
      run: |
        pytest tests/test_production.py -v --tb=short --junitxml=junit-production.xml

    # 6. Run Ashby 3.0 Phase 1 Tests (Rung 3 Abduction)
    - name: Run Ashby 3.0 Phase 1 Tests
      run: |
        pytest tests/test_structural_equations.py -v --tb=short --junitxml=junit-ashby3.xml

    # 7. Generate Coverage Report
    - name: Generate Coverage Report
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing

    # 8. Upload Test Results
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          junit-falsifiability.xml
          junit-production.xml
          junit-ashby3.xml
          htmlcov/

    # 9. Upload Coverage to Codecov (Optional)
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        env_vars: OS,PYTHON
        name: codecov-ashby-${{ matrix.python-version }}
        fail_ci_if_error: false

  # Optional: Smoke Test Dashboard
  smoke-test:
    name: Smoke Test Dashboard
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        pip install streamlit pandas networkx scipy
    - name: Run Dashboard Smoke Test
      run: |
        timeout 30 streamlit run dashboard.py --server.headless true &
        sleep 5
        curl -f http://localhost:8501 || exit 1
        echo "Dashboard smoke test passed"
